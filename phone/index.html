<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
/>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hand Control" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
<title>Hand Control</title>
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --muted: #666;
    --accent: #ff4d1f;
    --accent-soft: rgba(255, 77, 31, 0.18);
    --edge-bg: #0a0a0a;
    --edge-press: #1a1a1a;
    --box: #121212;
    --box-selected: #1d1d1d;
    --box-border: #1d1d1d;
    --box-border-selected: var(--accent);
    --green: #1ec67a;
    --green-dim: #0d4027;
    --red: #d94a26;
    --red-dim: #3f1810;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    touch-action: manipulation;
  }

  .hold, .edge, .action-btn {
    touch-action: none;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    /* Keep content clear of the notch / Dynamic Island / home indicator
       in landscape. viewport-fit=cover gives us the full display; these
       env() values tell us how much to inset on each side. */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  /* Top bar */
  header {
    flex: 0 0 auto;
    padding: 10px 14px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #0e0e0e;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #444;
    transition: background 0.2s;
  }
  .dot.ok { background: #1ec67a; }
  .dot.bad { background: #c23a1e; }

  .boxes {
    flex: 1;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .boxes::-webkit-scrollbar { display: none; }

  .box {
    flex: 0 0 auto;
    min-width: 90px;
    max-width: 180px;
    padding: 8px 12px;
    border: 1px solid var(--box-border);
    background: var(--box);
    border-radius: 10px;
    font-size: 12px;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .box.selected {
    border-color: var(--box-border-selected);
    background: var(--box-selected);
    color: var(--fg);
  }

  .empty-note {
    flex: 1;
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
  }

  /* Main row */
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .edge {
    flex: 0 0 13%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--edge-bg);
    color: #555;
    font-size: 36px;
    transition: background 0.08s, color 0.08s;
  }
  .edge.active {
    background: var(--edge-press);
    color: var(--fg);
  }

  /* Center column contains the hold area (top) and action buttons (bottom) */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .hold {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    min-height: 0;
  }

  .hold .project {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.01em;
    max-width: 90%;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--fg);
    transition: color 0.15s;
  }

  .hold .hint {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    transition: color 0.15s;
  }

  .hold.no-window .project { color: var(--muted); }
  .hold.no-window .hint { opacity: 0; }

  .pulse {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent-soft);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
  }

  .hold.holding .pulse { animation: pulse 1.4s ease-out infinite; }
  .hold.holding .project,
  .hold.holding .hint { color: var(--accent); }

  @keyframes pulse {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0.8; }
    80%  { transform: translate(-50%, -50%) scale(5);   opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(5);   opacity: 0; }
  }

  .blob {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.12s, transform 0.15s;
  }
  .hold.holding .blob {
    background: var(--accent);
    transform: scale(1.8);
  }
  .hold.waiting .blob {
    background: var(--accent);
    animation: spin 1s linear infinite;
    transform: scale(1.2);
  }

  @keyframes spin {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
  }

  /* Bottom action buttons (Delete / Submit) */
  .actions {
    flex: 0 0 30%;
    display: flex;
    border-top: 1px solid #0e0e0e;
    min-height: 90px;
  }

  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: #0a0a0a;
    color: #333;
    border: none;
    transition: background 0.12s, color 0.12s, transform 0.08s;
    pointer-events: none; /* disabled by default */
  }

  .action-btn .icon {
    font-size: 20px;
    line-height: 1;
  }

  .action-btn.delete.enabled {
    background: var(--red-dim);
    color: var(--red);
    pointer-events: auto;
  }
  .action-btn.delete.enabled:active {
    background: var(--red);
    color: #fff;
    transform: scale(0.98);
  }
  .action-btn.delete + .action-btn.submit {
    border-left: 1px solid #0e0e0e;
  }

  .action-btn.submit.enabled {
    background: var(--green-dim);
    color: var(--green);
    pointer-events: auto;
  }
  .action-btn.submit.enabled:active {
    background: var(--green);
    color: #000;
    transform: scale(0.98);
  }

  /* When waiting for Wispr, show a subtle loading pulse on both buttons */
  .actions.waiting .action-btn {
    animation: btn-pulse 1.4s ease-in-out infinite;
  }

  @keyframes btn-pulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1;   }
  }
</style>
</head>
<body>
  <header>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">connecting</span>
    </div>
    <div class="boxes" id="boxes">
      <div class="empty-note">No Cursor windows detected</div>
    </div>
  </header>

  <main>
    <div class="edge" id="edgeLeft">◀</div>

    <div class="center">
      <div class="hold" id="hold">
        <div class="project" id="project">—</div>
        <div class="blob"></div>
        <div class="hint" id="hint">Hold to talk</div>
        <div class="pulse"></div>
      </div>

      <div class="actions" id="actions">
        <button class="action-btn delete" id="btnDelete" type="button">
          <span class="icon">✕</span>
          <span>Delete</span>
        </button>
        <button class="action-btn submit" id="btnSubmit" type="button">
          <span class="icon">↵</span>
          <span>Submit</span>
        </button>
      </div>
    </div>

    <div class="edge" id="edgeRight">▶</div>
  </main>

<script>
(() => {
  const boxesEl = document.getElementById('boxes');
  const projectEl = document.getElementById('project');
  const hintEl = document.getElementById('hint');
  const holdEl = document.getElementById('hold');
  const actionsEl = document.getElementById('actions');
  const btnDelete = document.getElementById('btnDelete');
  const btnSubmit = document.getElementById('btnSubmit');
  const edgeL = document.getElementById('edgeLeft');
  const edgeR = document.getElementById('edgeRight');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');

  let ws = null;
  let reconnectDelay = 500;
  let windows = [];
  let selected = -1;
  let wakeLock = null;

  // State machine: 'idle' | 'holding' | 'waiting' | 'ready'
  let mode = 'idle';

  // ----- Wake lock -----
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch {}
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
  requestWakeLock();

  // ----- WebSocket -----
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
      reconnectDelay = 500;
      dot.className = 'dot ok';
      statusText.textContent = 'connected';
    };
    ws.onclose = () => {
      dot.className = 'dot bad';
      statusText.textContent = 'reconnecting';
      safeReset();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 5000);
    };
    ws.onerror = () => {};
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'state') {
          windows = msg.windows || [];
          selected = msg.selected;
          renderBoxes();
        } else if (msg.type === 'transcription_ready') {
          if (mode === 'waiting') setMode('ready');
        }
      } catch {}
    };
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  // ----- Mode / UI -----
  function setMode(m) {
    mode = m;
    // hold area visual state
    holdEl.classList.toggle('holding', m === 'holding');
    holdEl.classList.toggle('waiting', m === 'waiting');

    // Hint text
    if (windows.length === 0 || selected < 0) {
      hintEl.textContent = 'No Cursor windows';
    } else if (m === 'idle')      hintEl.textContent = 'Hold to talk';
    else if (m === 'holding')     hintEl.textContent = 'Listening…';
    else if (m === 'waiting')     hintEl.textContent = 'Transcribing…';
    else if (m === 'ready')       hintEl.textContent = 'Submit or delete';

    // Buttons
    const btnsActive = (m === 'ready');
    btnDelete.classList.toggle('enabled', btnsActive);
    btnSubmit.classList.toggle('enabled', btnsActive);
    actionsEl.classList.toggle('waiting', m === 'waiting');
  }

  function safeReset() {
    setMode('idle');
  }

  // ----- Rendering -----
  function renderBoxes() {
    if (windows.length === 0 || selected < 0) {
      projectEl.textContent = 'No Cursor windows';
      holdEl.classList.add('no-window');
    } else {
      projectEl.textContent = windows[selected].project || windows[selected].title;
      holdEl.classList.remove('no-window');
    }

    // Refresh hint to reflect window presence
    setMode(mode);

    boxesEl.innerHTML = '';
    if (windows.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-note';
      empty.textContent = 'No Cursor windows detected';
      boxesEl.appendChild(empty);
      return;
    }
    windows.forEach((w, i) => {
      const el = document.createElement('div');
      el.className = 'box' + (i === selected ? ' selected' : '');
      el.textContent = w.project || w.title;
      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        // Switching windows invalidates any pending confirmation.
        if (mode === 'waiting' || mode === 'ready') setMode('idle');
        send({ type: 'select', index: i });
      });
      boxesEl.appendChild(el);
    });
  }

  // ----- Hold-to-talk -----
  function startHold() {
    if (mode === 'holding') return;
    if (windows.length === 0) return;
    setMode('holding');
    send({ type: 'hold_start' });
  }

  function endHold() {
    if (mode !== 'holding') return;
    setMode('waiting');
    send({ type: 'hold_end' });
  }

  holdEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    holdEl.setPointerCapture(e.pointerId);
    startHold();
  });
  ['pointerup', 'pointercancel', 'pointerleave'].forEach((evt) => {
    holdEl.addEventListener(evt, (e) => {
      e.preventDefault();
      endHold();
    });
  });

  // ----- Submit / Delete -----
  btnSubmit.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (mode !== 'ready') return;
    send({ type: 'submit' });
    setMode('idle');
  });
  btnDelete.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (mode !== 'ready') return;
    send({ type: 'delete' });
    setMode('idle');
  });

  // ----- Edge taps (prev/next) -----
  function wireEdge(el, delta) {
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      el.classList.add('active');
      if (mode === 'waiting' || mode === 'ready') setMode('idle');
      send({ type: delta < 0 ? 'switch_prev' : 'switch_next' });
    });
    ['pointerup', 'pointercancel', 'pointerleave'].forEach((evt) => {
      el.addEventListener(evt, () => el.classList.remove('active'));
    });
  }
  wireEdge(edgeL, -1);
  wireEdge(edgeR, +1);

  // Prevent default gestures
  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('gesturechange', (e) => e.preventDefault());
  document.addEventListener('dblclick', (e) => e.preventDefault());
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  setMode('idle');
  connect();
})();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
/>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hand Control" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
<title>Hand Control</title>
<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --muted: #666;
    --accent: #ff4d1f;
    --accent-soft: rgba(255, 77, 31, 0.18);
    --edge-bg: #0a0a0a;
    --edge-press: #1a1a1a;
    --box: #121212;
    --box-selected: #1d1d1d;
    --box-border: #1d1d1d;
    --box-border-selected: var(--accent);
    --green: #1ec67a;
    --green-dim: #0d4027;
    --red: #d94a26;
    --red-dim: #3f1810;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    touch-action: manipulation;
  }

  .hold, .edge, .action-btn {
    touch-action: none;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    /* No body-level insets — each zone handles its own safe area so the
       UI background extends edge-to-edge while content stays clear of
       the notch / Dynamic Island / home indicator. */
  }

  /* Top bar — respect the top / side insets so "connected" and the
     project boxes never hide behind the Dynamic Island. */
  header {
    flex: 0 0 auto;
    padding: max(10px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right))
            8px max(14px, env(safe-area-inset-left));
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #0e0e0e;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #444;
    transition: background 0.2s;
  }
  .dot.ok { background: #1ec67a; }
  .dot.bad { background: #c23a1e; }

  .boxes {
    flex: 1;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .boxes::-webkit-scrollbar { display: none; }

  .box {
    flex: 0 0 auto;
    min-width: 90px;
    max-width: 180px;
    padding: 8px 12px;
    border: 1px solid var(--box-border);
    background: var(--box);
    border-radius: 10px;
    font-size: 12px;
    color: #aaa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: border-color 0.15s, background 0.15s, color 0.15s;
  }
  .box.selected {
    border-color: var(--box-border-selected);
    background: var(--box-selected);
    color: var(--fg);
  }

  .empty-note {
    flex: 1;
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
  }

  /* Preset strip — thin row of one-tap canned-prompt pills, below
     the project boxes. Horizontally scrollable so users with lots
     of presets can swipe through them. */
  .presets {
    flex: 0 0 auto;
    display: flex;
    gap: 6px;
    padding: 0 max(14px, env(safe-area-inset-right))
            max(8px, calc(env(safe-area-inset-bottom) * 0.1))
            max(14px, env(safe-area-inset-left));
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    border-bottom: 1px solid #0e0e0e;
    background: #050505;
    touch-action: pan-x;  /* horizontal scroll OK, no pinch/zoom */
    min-height: 0;
  }
  .presets::-webkit-scrollbar { display: none; }
  .presets.hidden { display: none; }

  .preset {
    flex: 0 0 auto;
    padding: 7px 13px;
    margin: 6px 0;
    border-radius: 999px;
    background: #121212;
    border: 1px solid #1d1d1d;
    color: #c8c8c8;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
    transition: background 0.08s, color 0.08s, transform 0.08s, border-color 0.12s;
    cursor: pointer;
  }
  .preset:active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--fg);
    transform: scale(0.96);
  }
  .preset.firing {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .preset.flash-ok {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }
  .preset.flash-err {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
  }

  /* Main row */
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }

  .edge {
    flex: 0 0 13%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--edge-bg);
    color: #555;
    font-size: 36px;
    transition: background 0.08s, color 0.08s;
  }
  /* Shift the arrow icon away from the notch / Dynamic Island, but the
     edge background and the full tap target still extend to the
     physical edge of the screen. */
  #edgeLeft { padding-left: env(safe-area-inset-left); }
  #edgeRight { padding-right: env(safe-area-inset-right); }
  .edge.active {
    background: var(--edge-press);
    color: var(--fg);
  }

  /* Center column contains the hold area (top) and action buttons (bottom) */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .hold {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
    min-height: 0;
    padding: 0 20px;
  }

  .hold .project {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    max-width: 90%;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--fg);
    transition: color 0.15s, opacity 0.2s;
  }

  .hold .hint {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
    transition: color 0.15s, opacity 0.2s;
  }

  .hold.no-window .project { color: var(--muted); }
  .hold.no-window .hint { opacity: 0; }

  /* Small chip above the "Hold to talk" prompt — warns the user in
     real time when macOS reports no text field is focused in the
     target window. */
  .focus-warn {
    display: none;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--red);
    background: var(--red-dim);
    padding: 4px 10px;
    border-radius: 999px;
  }
  .focus-warn.show { display: inline-flex; }
  .focus-warn::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
  }

  /* Transcription preview card — shown in 'ready' mode. Takes over the
     visual space so the user can read what they just dictated without
     looking at the Mac. */
  .preview {
    display: none;
    width: 100%;
    max-width: 520px;
    max-height: 100%;
    padding: 12px 16px;
    background: #0d0d0d;
    border: 1px solid #1a1a1a;
    border-radius: 10px;
    font-size: 16px;
    line-height: 1.35;
    color: var(--fg);
    text-align: left;
    overflow-y: auto;
    overflow-x: hidden;
    word-break: break-word;
    -webkit-user-select: text;
    user-select: text;
  }
  .preview.show { display: block; }
  .preview.warn {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
  }
  .preview.sent {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }
  .preview .label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .preview.warn .label { color: var(--red); opacity: 0.85; }
  .preview.sent  .label { color: var(--green); opacity: 0.85; }

  /* In ready mode, shrink the project name / blob so the preview
     card has room. Hint stays visible when there's no preview card
     (falls back to "Ready — Submit or Delete"). */
  .hold.ready .blob { display: none; }
  .hold.ready .project { font-size: 12px; opacity: 0.5; }
  /* When the preview card is present, hide the hint so the card
     gets visual priority. */
  .hold.has-preview .hint { display: none; }

  .pulse {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: var(--accent-soft);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
  }

  .hold.holding .pulse { animation: pulse 1.4s ease-out infinite; }
  .hold.holding .project,
  .hold.holding .hint { color: var(--accent); }

  @keyframes pulse {
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0.8; }
    80%  { transform: translate(-50%, -50%) scale(5);   opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(5);   opacity: 0; }
  }

  .blob {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.12s, transform 0.15s;
  }
  .hold.holding .blob {
    background: var(--accent);
    transform: scale(1.8);
  }
  .hold.waiting .blob {
    background: var(--accent);
    animation: spin 1s linear infinite;
    transform: scale(1.2);
  }

  @keyframes spin {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
  }

  /* Bottom action buttons (Delete / Submit) */
  .actions {
    flex: 0 0 30%;
    display: flex;
    border-top: 1px solid #0e0e0e;
    min-height: 90px;
  }

  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: #0a0a0a;
    color: #333;
    border: none;
    transition: background 0.12s, color 0.12s, transform 0.08s;
    pointer-events: none; /* disabled by default */
    /* Button background extends to the physical bottom of the screen,
       but its label is padded up to stay clear of the home indicator. */
    padding-bottom: env(safe-area-inset-bottom);
  }

  .action-btn .icon {
    font-size: 20px;
    line-height: 1;
  }

  .action-btn.delete.enabled {
    background: var(--red-dim);
    color: var(--red);
    pointer-events: auto;
  }
  .action-btn.delete.enabled:active {
    background: var(--red);
    color: #fff;
    transform: scale(0.98);
  }
  .action-btn.delete + .action-btn.submit {
    border-left: 1px solid #0e0e0e;
  }

  .action-btn.submit.enabled {
    background: var(--green-dim);
    color: var(--green);
    pointer-events: auto;
  }
  .action-btn.submit.enabled:active {
    background: var(--green);
    color: #000;
    transform: scale(0.98);
  }

  /* When waiting for Wispr, show a subtle loading pulse on both buttons */
  .actions.waiting .action-btn {
    animation: btn-pulse 1.4s ease-in-out infinite;
  }

  @keyframes btn-pulse {
    0%, 100% { opacity: 0.5; }
    50%      { opacity: 1;   }
  }
</style>
</head>
<body>
  <header>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">connecting</span>
    </div>
    <div class="boxes" id="boxes">
      <div class="empty-note">No Cursor windows detected</div>
    </div>
  </header>

  <div class="presets hidden" id="presets"></div>

  <main>
    <div class="edge" id="edgeLeft">◀</div>

    <div class="center">
      <div class="hold" id="hold">
        <div class="project" id="project">—</div>
        <div class="blob"></div>
        <div class="hint" id="hint">Hold to talk</div>
        <div class="focus-warn" id="focusWarn">No text field focused</div>
        <div class="preview" id="preview">
          <span class="label" id="previewLabel">Transcription</span>
          <span id="previewText"></span>
        </div>
        <div class="pulse"></div>
      </div>

      <div class="actions" id="actions">
        <button class="action-btn delete" id="btnDelete" type="button">
          <span class="icon">✕</span>
          <span>Delete</span>
        </button>
        <button class="action-btn submit" id="btnSubmit" type="button">
          <span class="icon">↵</span>
          <span>Submit</span>
        </button>
      </div>
    </div>

    <div class="edge" id="edgeRight">▶</div>
  </main>

<script>
(() => {
  const boxesEl = document.getElementById('boxes');
  const presetsEl = document.getElementById('presets');
  const projectEl = document.getElementById('project');
  const hintEl = document.getElementById('hint');
  const holdEl = document.getElementById('hold');
  const focusWarnEl = document.getElementById('focusWarn');
  const previewEl = document.getElementById('preview');
  const previewLabelEl = document.getElementById('previewLabel');
  const previewTextEl = document.getElementById('previewText');
  const actionsEl = document.getElementById('actions');
  const btnDelete = document.getElementById('btnDelete');
  const btnSubmit = document.getElementById('btnSubmit');
  const edgeL = document.getElementById('edgeLeft');
  const edgeR = document.getElementById('edgeRight');
  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');

  let ws = null;
  let reconnectDelay = 500;
  let windows = [];
  let selected = -1;
  let presets = [];
  let wakeLock = null;

  // State machine: 'idle' | 'holding' | 'waiting' | 'ready' | 'sent'
  // 'sent' is shown when Wispr's "press enter" voice command already
  // submitted the message — no Submit/Delete needed, auto-resets to idle.
  let mode = 'idle';
  let lastTranscription = '';
  let lastHadTextField = true;
  let lastAutoSubmitted = false;
  let sentResetTimer = null;

  // ----- Wake lock -----
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch {}
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
  requestWakeLock();

  // ----- WebSocket -----
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
      reconnectDelay = 500;
      dot.className = 'dot ok';
      statusText.textContent = 'connected';
    };
    ws.onclose = () => {
      dot.className = 'dot bad';
      statusText.textContent = 'reconnecting';
      safeReset();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 5000);
    };
    ws.onerror = () => {};
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'state') {
          windows = msg.windows || [];
          selected = msg.selected;
          // Presets are part of the state snapshot — re-render if the
          // server reloaded them (e.g. restart with new presets.json).
          const nextPresets = msg.presets || [];
          const changed = JSON.stringify(nextPresets) !== JSON.stringify(presets);
          presets = nextPresets;
          renderBoxes();
          if (changed) renderPresets();
        } else if (msg.type === 'preset_result') {
          flashPreset(msg.id, !!msg.ok);
        } else if (msg.type === 'focus_status') {
          // Server tells us right after we press hold whether the
          // Cursor window has a focused text field. Surface as a
          // subtle chip so the user can abort early if needed.
          const ok = !!msg.has_text_field;
          focusWarnEl.classList.toggle('show', mode === 'holding' && !ok);
        } else if (msg.type === 'transcription_ready') {
          lastTranscription = (msg.text || '').trim();
          lastHadTextField = msg.had_text_field !== false;
          lastAutoSubmitted = msg.auto_submitted === true;
          // If we ended up with a transcription, there was obviously a
          // usable field — drop any stale warning chip from hold_start.
          if (lastTranscription || lastAutoSubmitted) {
            focusWarnEl.classList.remove('show');
          }
          if (mode === 'waiting') {
            setMode(lastAutoSubmitted ? 'sent' : 'ready');
          }
        }
      } catch {}
    };
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  // ----- Mode / UI -----
  function setMode(m) {
    mode = m;

    // Cancel any pending auto-dismiss when leaving 'sent' mode.
    if (m !== 'sent' && sentResetTimer) {
      clearTimeout(sentResetTimer);
      sentResetTimer = null;
    }

    // hold area visual state
    holdEl.classList.toggle('holding', m === 'holding');
    holdEl.classList.toggle('waiting', m === 'waiting');
    holdEl.classList.toggle('ready', m === 'ready' || m === 'sent');

    // Hint text
    if (windows.length === 0 || selected < 0) {
      hintEl.textContent = 'No Cursor windows';
    } else if (m === 'idle')      hintEl.textContent = 'Hold to talk';
    else if (m === 'holding')     hintEl.textContent = 'Listening…';
    else if (m === 'waiting')     hintEl.textContent = 'Transcribing…';
    else if (m === 'ready') {
      // Show a small hint when there's no preview card to fill the space.
      hintEl.textContent = (lastTranscription || !lastHadTextField)
        ? ''
        : 'Ready — Submit or Delete';
    }
    else if (m === 'sent')        hintEl.textContent = '';

    // Only show the "no text field" warning while the user is actively
    // holding — once they release, the focus might shift and the
    // warning would become stale.
    if (m !== 'holding') focusWarnEl.classList.remove('show');

    // Transcription preview
    previewEl.classList.remove('show', 'warn', 'sent');
    if (m === 'ready') {
      if (lastTranscription) {
        previewLabelEl.textContent = 'Transcription';
        previewTextEl.textContent = lastTranscription;
        previewEl.classList.add('show');
      } else if (!lastHadTextField) {
        // Confident failure: macOS reported no focused text field.
        // This one is actionable — warn in red.
        previewEl.classList.add('warn', 'show');
        previewLabelEl.textContent = 'No text field focused';
        previewTextEl.textContent =
          "Click into the Cursor chat box (or any text field) before holding.";
      }
      // Otherwise: the field was focused and Wispr likely typed into it,
      // but we couldn't read the content back (common with Electron /
      // Cursor chat inputs that don't expose their value over the
      // Accessibility API). Don't show a scary warning — the user can
      // glance at their Mac to see what was dictated, and Submit /
      // Delete still work as usual.
    } else if (m === 'sent') {
      // Wispr's "press enter" command already submitted the message.
      previewEl.classList.add('show', 'sent');
      previewLabelEl.textContent = '✓ Sent via "press enter"';
      previewTextEl.textContent = lastTranscription || '(submitted)';
      // Auto-dismiss back to idle after a moment so the next hold
      // starts clean. Tapping anywhere also dismisses.
      sentResetTimer = setTimeout(() => {
        if (mode === 'sent') setMode('idle');
      }, 3500);
    }

    // Let the hold area know whether the preview card is present, so
    // the hint text (our fallback when there's no preview) can be
    // hidden to avoid competing with the card.
    holdEl.classList.toggle('has-preview', previewEl.classList.contains('show'));

    // Buttons — only active in 'ready' mode. In 'sent', nothing to do.
    const btnsActive = (m === 'ready');
    btnDelete.classList.toggle('enabled', btnsActive);
    btnSubmit.classList.toggle('enabled', btnsActive);
    actionsEl.classList.toggle('waiting', m === 'waiting');
  }

  function safeReset() {
    setMode('idle');
  }

  // ----- Rendering -----
  function renderPresets() {
    presetsEl.innerHTML = '';
    if (!presets.length) {
      presetsEl.classList.add('hidden');
      return;
    }
    presetsEl.classList.remove('hidden');
    presets.forEach((p) => {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'preset';
      el.dataset.presetId = p.id;
      el.textContent = p.label;
      // Small hint in the title attribute — useful when debugging
      // from desktop, invisible on phone.
      el.title = `${p.label} (${p.submit})`;
      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        firePreset(p);
      });
      presetsEl.appendChild(el);
    });
  }

  function firePreset(p) {
    // Ignore while holding to talk — the user is clearly doing
    // something else. Any pending post-dictation state gets cleared
    // so the preset flash is the primary feedback.
    if (mode === 'holding') return;
    if (mode === 'waiting' || mode === 'ready' || mode === 'sent') {
      setMode('idle');
    }
    if (!windows.length) return;

    const el = presetsEl.querySelector(`.preset[data-preset-id="${cssEscape(p.id)}"]`);
    if (el) {
      el.classList.remove('flash-ok', 'flash-err');
      el.classList.add('firing');
    }
    send({ type: 'preset', id: p.id });
  }

  function flashPreset(id, ok) {
    const el = presetsEl.querySelector(`.preset[data-preset-id="${cssEscape(id)}"]`);
    if (!el) return;
    el.classList.remove('firing');
    el.classList.add(ok ? 'flash-ok' : 'flash-err');
    setTimeout(() => {
      el.classList.remove('flash-ok', 'flash-err');
    }, 900);
  }

  // Small CSS selector escape helper — preset ids are slugified server-
  // side but we still sanitize for safety (ids could come from a
  // user-edited JSON file).
  function cssEscape(s) {
    if (window.CSS && CSS.escape) return CSS.escape(s);
    return String(s).replace(/[^a-zA-Z0-9_-]/g, (c) => `\\${c}`);
  }

  function renderBoxes() {
    if (windows.length === 0 || selected < 0) {
      projectEl.textContent = 'No Cursor windows';
      holdEl.classList.add('no-window');
    } else {
      projectEl.textContent = windows[selected].project || windows[selected].title;
      holdEl.classList.remove('no-window');
    }

    // Refresh hint to reflect window presence
    setMode(mode);

    boxesEl.innerHTML = '';
    if (windows.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-note';
      empty.textContent = 'No Cursor windows detected';
      boxesEl.appendChild(empty);
      return;
    }
    windows.forEach((w, i) => {
      const el = document.createElement('div');
      el.className = 'box' + (i === selected ? ' selected' : '');
      el.textContent = w.project || w.title;
      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        // Switching windows invalidates any pending confirmation.
        if (mode === 'waiting' || mode === 'ready' || mode === 'sent') {
          setMode('idle');
        }
        send({ type: 'select', index: i });
      });
      boxesEl.appendChild(el);
    });
  }

  // ----- Hold-to-talk -----
  function startHold() {
    if (mode === 'holding') return;
    if (windows.length === 0) return;
    setMode('holding');
    send({ type: 'hold_start' });
  }

  function endHold() {
    if (mode !== 'holding') return;
    setMode('waiting');
    send({ type: 'hold_end' });
  }

  holdEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    holdEl.setPointerCapture(e.pointerId);
    startHold();
  });
  ['pointerup', 'pointercancel', 'pointerleave'].forEach((evt) => {
    holdEl.addEventListener(evt, (e) => {
      e.preventDefault();
      endHold();
    });
  });

  // ----- Submit / Delete -----
  btnSubmit.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (mode !== 'ready') return;
    send({ type: 'submit' });
    setMode('idle');
  });
  btnDelete.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (mode !== 'ready') return;
    send({ type: 'delete' });
    setMode('idle');
  });

  // ----- Edge taps (prev/next) -----
  function wireEdge(el, delta) {
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      el.classList.add('active');
      if (mode === 'waiting' || mode === 'ready' || mode === 'sent') {
        setMode('idle');
      }
      send({ type: delta < 0 ? 'switch_prev' : 'switch_next' });
    });
    ['pointerup', 'pointercancel', 'pointerleave'].forEach((evt) => {
      el.addEventListener(evt, () => el.classList.remove('active'));
    });
  }
  wireEdge(edgeL, -1);
  wireEdge(edgeR, +1);

  // Prevent default gestures
  document.addEventListener('gesturestart', (e) => e.preventDefault());
  document.addEventListener('gesturechange', (e) => e.preventDefault());
  document.addEventListener('dblclick', (e) => e.preventDefault());
  document.addEventListener('contextmenu', (e) => e.preventDefault());

  setMode('idle');
  renderPresets();
  connect();
})();
</script>
</body>
</html>

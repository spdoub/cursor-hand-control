<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
/>
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Hand Control" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
<title>Hand Control</title>
<style>
  :root {
    --bg: #000;
    --bg-card: #0f0f0f;
    --bg-card-active: #161616;
    --fg: #fff;
    --muted: #6b6b6b;
    --muted-2: #333;
    --accent: #ff4d1f;
    --accent-soft: rgba(255, 77, 31, 0.18);
    --accent-glow: rgba(255, 77, 31, 0.55);
    --accent-bg: #1a0d08;
    --green: #1ec67a;
    --green-dim: #0d4027;
    --red: #d94a26;
    --red-dim: #3f1810;
    --card-radius: 20px;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, sans-serif;
    overflow: hidden;
    overscroll-behavior: none;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    touch-action: manipulation;
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* ------------- Header ------------- */
  header {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: max(10px, env(safe-area-inset-top))
             max(14px, env(safe-area-inset-right))
             6px
             max(14px, env(safe-area-inset-left));
  }

  .status {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #444;
    transition: background 0.25s;
  }
  .dot.ok { background: var(--green); }
  .dot.bad { background: var(--red); }

  /* Pager dots — iOS-style "app switcher" style pill for the active
     card, round dots for the inactive ones. Tap to jump. */
  .pager {
    display: flex;
    align-items: center;
    gap: 6px;
    min-height: 10px;
  }
  .pager-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted-2);
    transition: background 0.25s, width 0.25s, border-radius 0.25s;
    cursor: pointer;
  }
  .pager-dot.active {
    width: 22px;
    border-radius: 3px;
    background: var(--accent);
  }
  .pager.hidden { display: none; }

  /* ------------- Mode tabs (Deck / Pad) ------------- */
  .mode-tabs {
    display: flex;
    gap: 4px;
    padding: 3px;
    background: #0d0d0d;
    border: 1px solid #1c1c1c;
    border-radius: 999px;
  }
  .mode-tab {
    padding: 5px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #777;
    background: transparent;
    border: none;
    border-radius: 999px;
    transition: background 0.18s, color 0.18s;
    cursor: pointer;
    min-width: 54px;
  }
  .mode-tab.active {
    background: var(--accent);
    color: #000;
  }
  .mode-tab:active:not(.active) {
    color: #ccc;
  }

  /* Hide the joystick chip in pad mode — joystick is deck-only. */
  body[data-app-mode="pad"] .joy-chip {
    display: none !important;
  }

  /* ------------- Joystick toggle chip (deck only) -------------
     When ON, the deck becomes a virtual-joystick surface. Touch
     anywhere to drop the stick's origin at that point, drag to
     steer the cursor (rate control with a dead zone), release to
     stop. A quick tap (no drag) is a left click. */
  .joy-chip {
    padding: 5px 10px 5px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #777;
    background: #0d0d0d;
    border: 1px solid #1c1c1c;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: color 0.18s, background 0.18s, border-color 0.18s;
    cursor: pointer;
    user-select: none;
  }
  .joy-chip .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    transition: background 0.18s, box-shadow 0.18s;
  }
  .joy-chip.on {
    color: var(--accent);
    background: rgba(242, 95, 76, 0.12);
    border-color: var(--accent-soft);
  }
  .joy-chip.on .dot {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(242, 95, 76, 0.7);
  }

  /* Deck overlay while joystick is active: hint at bottom. */
  .joy-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 10px;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
    z-index: 3;
  }
  body.joy-on .joy-overlay { display: flex; }
  body.joy-on .card .pulse,
  body.joy-on .card .blob { opacity: 0; }
  body.joy-on .card.active {
    border-color: var(--accent-soft);
    background: linear-gradient(180deg, #141414 0%, #0e0e0e 100%);
  }
  /* Hide the card track entirely while driving the joystick so
     the deck reads as a dedicated control surface. The selected
     card's title stays visible as the page header. */
  body.joy-on .track {
    opacity: 0.25;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  /* ------------- Joystick visuals -------------------------
     Rendered absolutely inside #deck, centered on the touch
     point when active. Both layers are pointer-events:none so
     they don't steal the active pointer. */
  .joy-ring,
  .joy-nub {
    position: absolute;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 4;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .joy-ring {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid rgba(242, 95, 76, 0.35);
    background: radial-gradient(circle,
                  rgba(242, 95, 76, 0.05) 0%,
                  rgba(242, 95, 76, 0.12) 55%,
                  rgba(242, 95, 76, 0.0) 72%);
    box-shadow: 0 0 40px rgba(242, 95, 76, 0.18) inset;
  }
  .joy-ring::before {
    /* Inner dashed ring that marks the dead zone. Inside this
       radius the joystick doesn't emit motion — keeps the cursor
       still when your thumb is on the center dot. */
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 40px;
    height: 40px;
    border: 1px dashed rgba(242, 95, 76, 0.35);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .joy-nub {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ff7f6b 0%, #d85040 60%, #a63a2d 100%);
    box-shadow:
      0 0 18px rgba(242, 95, 76, 0.6),
      0 2px 8px rgba(0, 0, 0, 0.6),
      inset 0 -4px 8px rgba(0, 0, 0, 0.35);
  }
  .joy-ring.show,
  .joy-nub.show { opacity: 1; }

  /* ------------- Preset pills ------------- */
  .presets {
    flex: 0 0 auto;
    display: flex;
    gap: 6px;
    padding: 0 max(14px, env(safe-area-inset-right))
            6px max(14px, env(safe-area-inset-left));
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    touch-action: pan-x;
    min-height: 0;
  }
  .presets::-webkit-scrollbar { display: none; }
  .presets.hidden { display: none; }

  .preset {
    flex: 0 0 auto;
    padding: 7px 13px;
    margin: 2px 0;
    border-radius: 999px;
    background: #121212;
    border: 1px solid #1c1c1c;
    color: #c8c8c8;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.02em;
    white-space: nowrap;
    transition: background 0.1s, color 0.1s, transform 0.1s, border-color 0.15s;
  }
  .preset:active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--fg);
    transform: scale(0.96);
  }
  .preset.firing {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .preset.flash-ok {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
  }
  .preset.flash-err {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
  }

  /* ------------- Card deck (main area) ------------- */
  .deck {
    flex: 1;
    position: relative;
    min-height: 0;
    overflow: hidden;
    padding: 6px max(4px, env(safe-area-inset-right))
             6px max(4px, env(safe-area-inset-left));
    touch-action: none;
  }

  .track {
    display: flex;
    height: 100%;
    align-items: stretch;
    /* Spring-ish easing — settles fast then glides into place. */
    transition: transform 380ms cubic-bezier(0.22, 0.9, 0.28, 1);
    will-change: transform;
  }
  .track.dragging {
    transition: none;
  }

  .card {
    flex: 0 0 auto;        /* width set by JS from measured deck size */
    height: 100%;
    margin: 0 6px;
    padding: 22px 28px;
    background: var(--bg-card);
    border: 1px solid #1c1c1c;
    border-radius: var(--card-radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
    opacity: 0.45;
    transform: scale(0.92);
    /* During dragging this transition is still active — that's fine,
       the scale/opacity interpolation between peeking and active
       looks smooth. */
    transition: background 0.25s, border-color 0.25s,
                opacity 0.3s cubic-bezier(0.22, 0.9, 0.28, 1),
                transform 0.3s cubic-bezier(0.22, 0.9, 0.28, 1);
  }
  .card.active {
    opacity: 1;
    transform: scale(1);
    background: var(--bg-card-active);
  }

  .card.empty {
    border-style: dashed;
    border-color: #222;
  }
  .card.empty .project { color: var(--muted); }
  .card.empty .hint { color: var(--muted-2); }

  /* Mode-specific styles (apply to the .active card only) */
  .card.holding {
    background: var(--accent-bg);
    border-color: var(--accent);
    box-shadow: 0 0 60px -10px var(--accent-glow) inset;
  }
  .card.holding .project { color: #ffeae3; }
  .card.holding .hint {
    color: var(--accent);
    font-weight: 600;
  }

  .card.waiting .hint { color: var(--accent); }

  .card.ready {
    border-color: #2e2e2e;
  }
  .card.ready .hint {
    color: #aaa;
  }

  .card.sent .project { font-size: 15px; opacity: 0.5; }
  .card.sent .hint { display: none; }
  .card.sent .blob { display: none; }

  .card .project {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.2s, font-size 0.3s, opacity 0.3s;
  }

  /* Host badge — tiny pill in the top-right corner of each card
     telling you whether this window lives on your Mac or your PC.
     Hidden automatically when the server has no peer configured
     (single-machine mode), via the [data-has-peer="0"] rule below. */
  .card .host-badge {
    position: absolute;
    top: 14px;
    right: 14px;
    padding: 3px 8px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #888;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid #232323;
    border-radius: 999px;
    pointer-events: none;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .card .host-badge[data-host="mac"] {
    color: var(--accent);
    border-color: var(--accent-soft);
    background: rgba(242, 95, 76, 0.08);
  }
  .card .host-badge[data-host="pc"] {
    color: var(--green);
    border-color: rgba(39, 201, 63, 0.35);
    background: rgba(39, 201, 63, 0.08);
  }
  body[data-has-peer="0"] .card .host-badge { display: none; }

  .card .hint {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.2s;
  }

  .card .blob {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.25s, transform 0.3s, box-shadow 0.3s;
    position: relative;
    z-index: 1;
  }
  .card.holding .blob {
    background: var(--accent);
    transform: scale(1.8);
    box-shadow: 0 0 30px 4px var(--accent-glow);
  }
  .card.waiting .blob {
    background: var(--accent);
    animation: blob-pulse 1s ease-in-out infinite;
    transform: scale(1.2);
  }

  @keyframes blob-pulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 1;    }
  }

  /* Pulse rings radiate out from the center while holding. */
  .card .pulse {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--accent-soft);
    transform: translate(-50%, -50%) scale(0);
    opacity: 0;
    pointer-events: none;
  }
  .card.holding .pulse {
    animation: pulse-out 1.5s ease-out infinite;
  }

  @keyframes pulse-out {
    0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0.7; }
    80%  { transform: translate(-50%, -50%) scale(6);   opacity: 0;   }
    100% { transform: translate(-50%, -50%) scale(6);   opacity: 0;   }
  }

  /* ------------- Trackpad (pad mode) ------------- */
  .trackpad {
    flex: 1;
    position: relative;
    min-height: 0;
    margin: 6px max(10px, env(safe-area-inset-right))
            6px max(10px, env(safe-area-inset-left));
    background: radial-gradient(ellipse at center, #141414 0%, #0a0a0a 80%);
    border: 1px solid #1f1f1f;
    border-radius: 20px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  .trackpad .label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #888;
    transition: color 0.25s;
  }
  .trackpad .sub {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: #444;
    text-align: center;
    line-height: 1.6;
    max-width: 70%;
  }
  .trackpad.active .label { color: var(--accent); }
  .trackpad.active { border-color: var(--accent-soft); }

  /* Which machine currently owns the virtual cursor. Pill floats
     in the top-right of the pad. Swaps color when crossing. */
  .pad-host {
    position: absolute;
    top: 10px;
    right: 12px;
    padding: 4px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    color: var(--accent);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid var(--accent-soft);
    border-radius: 999px;
    transition: color 0.2s, border-color 0.2s;
    pointer-events: none;
  }
  .pad-host[data-host="pc"] {
    color: var(--green);
    border-color: rgba(39, 201, 63, 0.45);
  }
  /* Hide when there's no peer configured — no point in a "MAC"
     badge when that's the only option. */
  .trackpad[data-peer="off"] .pad-host { display: none; }

  /* Subtle dot-grid texture to signal "this is draggable" */
  .trackpad::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, #1a1a1a 1px, transparent 1.5px);
    background-size: 28px 28px;
    background-position: center;
    opacity: 0.7;
    pointer-events: none;
  }

  /* Ripple / touch indicator — a soft orange dot where the finger
     currently is. JS positions it via CSS vars. */
  .pad-touch {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.6);
    transition: opacity 0.25s, transform 0.25s;
    top: var(--touch-y, 50%);
    left: var(--touch-x, 50%);
  }
  .pad-touch.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* --- Mode-scoped visibility ---
     The app element flips a data attribute between 'deck' and 'pad';
     everything shows/hides accordingly. */
  body[data-app-mode="deck"] .trackpad { display: none; }
  body[data-app-mode="pad"]  .deck     { display: none; }
  body[data-app-mode="pad"]  .presets  { display: none; }
  body[data-app-mode="pad"]  .pager    { display: none; }

  /* Bottom-action labels swap between Delete/Submit (deck mode) and
     L-Click / R-Click (pad mode). Both are always present in the DOM;
     CSS controls visibility so the swap is zero-flicker. */
  .action-btn .label-deck,
  .action-btn .label-pad { display: none; }
  body[data-app-mode="deck"] .action-btn .label-deck { display: block; }
  body[data-app-mode="pad"]  .action-btn .label-pad  { display: block; }

  /* In pad mode, both action buttons are always enabled (they're
     click buttons, not post-dictation actions). */
  body[data-app-mode="pad"] .action-btn.delete {
    background: var(--red-dim);
    color: var(--red);
    pointer-events: auto;
    animation: none;
  }
  body[data-app-mode="pad"] .action-btn.delete:active {
    background: var(--red);
    color: #fff;
    transform: scale(0.98);
  }
  body[data-app-mode="pad"] .action-btn.submit {
    background: var(--green-dim);
    color: var(--green);
    pointer-events: auto;
    animation: none;
  }
  body[data-app-mode="pad"] .action-btn.submit:active {
    background: var(--green);
    color: #000;
    transform: scale(0.98);
  }

  /* "Sent via press enter" confirmation pill — replaces hint / blob
     on the active card for a few seconds. */
  .sent-pill {
    display: none;
    padding: 10px 18px;
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 999px;
    color: var(--green);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    animation: sent-in 0.3s ease-out;
  }
  .card.sent .sent-pill { display: inline-block; }

  @keyframes sent-in {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* ------------- Bottom actions ------------- */
  .actions {
    flex: 0 0 auto;
    display: flex;
    border-top: 1px solid #0e0e0e;
    min-height: 86px;
  }

  .action-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    background: #0a0a0a;
    color: #333;
    border: none;
    transition: background 0.12s, color 0.12s, transform 0.08s;
    pointer-events: none;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .action-btn .icon {
    font-size: 19px;
    line-height: 1;
  }

  .action-btn.delete + .action-btn.submit {
    border-left: 1px solid #0e0e0e;
  }

  .action-btn.delete.enabled {
    background: var(--red-dim);
    color: var(--red);
    pointer-events: auto;
  }
  .action-btn.delete.enabled:active {
    background: var(--red);
    color: #fff;
    transform: scale(0.98);
  }

  .action-btn.submit.enabled {
    background: var(--green-dim);
    color: var(--green);
    pointer-events: auto;
  }
  .action-btn.submit.enabled:active {
    background: var(--green);
    color: #000;
    transform: scale(0.98);
  }

  .actions.waiting .action-btn {
    animation: btn-pulse 1.4s ease-in-out infinite;
  }
  @keyframes btn-pulse {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1;   }
  }
</style>
</head>
<body>
  <header>
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="statusText">connecting</span>
    </div>
    <div class="mode-tabs" id="modeTabs">
      <button class="mode-tab active" data-app-mode="deck" type="button">Deck</button>
      <button class="mode-tab" data-app-mode="pad" type="button">Pad</button>
    </div>
    <div style="position:relative;">
      <button class="joy-chip" id="joyChip" type="button" aria-pressed="false">
        <span class="dot"></span>
        <span>Stick</span>
      </button>
    </div>
    <div class="pager" id="pager"></div>
  </header>

  <div class="presets hidden" id="presets"></div>

  <div class="deck" id="deck">
    <div class="track" id="track"></div>
    <div class="joy-ring" id="joyRing"></div>
    <div class="joy-nub"  id="joyNub"></div>
    <div class="joy-overlay">Drag to move · Tap to click</div>
  </div>

  <div class="trackpad" id="trackpad" data-peer="off">
    <div class="pad-host" id="padHost" data-host="mac">MAC</div>
    <div class="label">Trackpad</div>
    <div class="sub">
      Drag to move · Tap to click<br>
      Two fingers to scroll
    </div>
    <div class="pad-touch" id="padTouch"></div>
  </div>

  <div class="actions" id="actions">
    <button class="action-btn delete" id="btnDelete" type="button">
      <span class="icon">✕</span>
      <span class="label-deck">Delete</span>
      <span class="label-pad">L-Click</span>
    </button>
    <button class="action-btn submit" id="btnSubmit" type="button">
      <span class="icon">↵</span>
      <span class="label-deck">Submit</span>
      <span class="label-pad">R-Click</span>
    </button>
  </div>

<script>
(() => {
  const deckEl     = document.getElementById('deck');
  const trackEl    = document.getElementById('track');
  const pagerEl    = document.getElementById('pager');
  const presetsEl  = document.getElementById('presets');
  const actionsEl  = document.getElementById('actions');
  const btnDelete  = document.getElementById('btnDelete');
  const btnSubmit  = document.getElementById('btnSubmit');
  const dot        = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const trackpadEl = document.getElementById('trackpad');
  const padTouchEl = document.getElementById('padTouch');
  const padHostEl  = document.getElementById('padHost');
  const modeTabsEl = document.getElementById('modeTabs');
  const joyChipEl  = document.getElementById('joyChip');
  const joyRingEl  = document.getElementById('joyRing');
  const joyNubEl   = document.getElementById('joyNub');

  // ---------------- State ----------------
  let ws = null;
  let reconnectDelay = 500;
  let windows = [];
  let selected = -1;
  let presets = [];
  let wakeLock = null;

  // 'idle' | 'holding' | 'waiting' | 'ready' | 'sent'
  let mode = 'idle';
  let sentResetTimer = null;

  // Top-level app mode — which surface (card deck or trackpad) the
  // user is interacting with right now.
  let appMode = 'deck'; // 'deck' | 'pad'

  // Card geometry — recomputed on resize.
  let cardWidth = 0;
  let cardStep  = 0;  // cardWidth + 2 * margin
  let restOffset = 0; // X that centers selected=0 in the deck
  const CARD_MARGIN_PX = 6; // MUST match the CSS on .card

  // Gesture state — null when no finger down.
  let gesture = null;

  // ---------------- Wake lock ----------------
  async function requestWakeLock() {
    if (!('wakeLock' in navigator)) return;
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    } catch {}
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });
  requestWakeLock();

  // ---------------- Haptic feedback ----------------
  //
  // Web Vibration API wrapper. Patterns are in milliseconds —
  // either a single number (one pulse) or an [on, off, on, …] array.
  // Support matrix:
  //   • Android Chrome / Firefox / Samsung Internet → ✓ works.
  //   • Desktop Chrome / Edge on touch hardware     → ✓ works.
  //   • iOS Safari (incl. Add-to-Home-Screen PWAs)  → ✗ no-op,
  //     because Apple has never exposed the Taptic Engine to web
  //     apps. There is no known workaround that's both reliable
  //     and App-Store-compliant without a native wrapper.
  //
  // We feature-detect and silently swallow errors so an iPhone
  // just gets a slightly less tactile but otherwise identical
  // experience rather than any crash.
  const HAPTIC = {
    TAP:    6,            // generic click / button press
    SOFT:   10,           // small state change (mode switch, edge cross)
    MEDIUM: 18,           // "thing is now live" — hold engaged
    DONE:   [8, 40, 14],  // success — transcription ready / submitted
    ERR:    [20, 60, 20], // preset failed / nothing happened
  };
  function haptic(pattern) {
    if (!('vibrate' in navigator)) return;
    try { navigator.vibrate(pattern); } catch {}
  }

  // ---------------- WebSocket ----------------
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
      reconnectDelay = 500;
      dot.className = 'dot ok';
      statusText.textContent = 'connected';
    };
    ws.onclose = () => {
      dot.className = 'dot bad';
      statusText.textContent = 'reconnecting';
      safeReset();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 5000);
    };
    ws.onerror = () => {};
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'state') {
          const nextWindows = msg.windows || [];
          const nextSelected = (typeof msg.selected === 'number') ? msg.selected : -1;
          const nextPresets = msg.presets || [];
          const nextPeer = msg.peer || null;

          const windowsChanged =
            JSON.stringify(nextWindows) !== JSON.stringify(windows);
          const presetsChanged =
            JSON.stringify(nextPresets) !== JSON.stringify(presets);

          windows = nextWindows;
          selected = nextSelected;
          presets = nextPresets;

          // Peer info drives the "data-has-peer" flag on the body,
          // which hides host badges entirely when it's a Mac-only
          // setup (no PC configured). Keeps the UI calm when there's
          // no PC to talk about.
          const hasPeer = !!(nextPeer && nextPeer.configured);
          document.body.setAttribute('data-has-peer', hasPeer ? '1' : '0');
          trackpadEl.setAttribute('data-peer', hasPeer ? 'on' : 'off');

          // Cursor-host pill on the trackpad. msg.cursor_host is
          // included in the initial state snapshot; subsequent
          // changes come via a 'cursor_host' message.
          if (msg.cursor_host) setCursorHost(msg.cursor_host);

          if (presetsChanged) renderPresets();
          if (windowsChanged) buildCards();
          updateActive();
          renderPager();
          applyModeClass();
          // Snap the track without animation during drag; otherwise
          // glide to the new position.
          if (gesture && gesture.committed === 'swipe') {
            // user is mid-swipe — don't fight them
          } else {
            layoutTrack();
          }
        } else if (msg.type === 'cursor_host') {
          setCursorHost(msg.host);
        } else if (msg.type === 'preset_result') {
          flashPreset(msg.id, !!msg.ok);
        } else if (msg.type === 'transcription_ready') {
          // The Return keydown IS visible to our event tap, so we can
          // still tell the user when Wispr's "press enter" voice
          // command auto-submitted — even though the transcribed text
          // itself isn't visible to us on Electron apps.
          const autoSubmitted = msg.auto_submitted === true;
          if (mode === 'waiting') {
            setMode(autoSubmitted ? 'sent' : 'ready');
            // Transcription arrived — success pulse. Stronger if
            // we auto-sent ("it's done, look at your Mac") than if
            // we're waiting for a button tap ("your turn").
            haptic(autoSubmitted ? HAPTIC.DONE : HAPTIC.SOFT);
          }
        }
      } catch {}
    };
  }

  function send(obj) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(obj));
    }
  }

  // ---------------- Mode / UI ----------------
  function setMode(m) {
    mode = m;

    if (m !== 'sent' && sentResetTimer) {
      clearTimeout(sentResetTimer);
      sentResetTimer = null;
    }
    if (m === 'sent') {
      sentResetTimer = setTimeout(() => {
        if (mode === 'sent') setMode('idle');
      }, 3500);
    }

    const btnsActive = (m === 'ready');
    btnDelete.classList.toggle('enabled', btnsActive);
    btnSubmit.classList.toggle('enabled', btnsActive);
    actionsEl.classList.toggle('waiting', m === 'waiting');

    applyModeClass();
  }

  function safeReset() {
    setMode('idle');
  }

  // Apply the current mode's CSS classes to the active card. Only the
  // active card shows mode state — peeking cards stay neutral.
  function applyModeClass() {
    const cards = trackEl.querySelectorAll('.card');
    cards.forEach((c) => {
      c.classList.remove('holding', 'waiting', 'ready', 'sent');
    });
    const active = trackEl.querySelector('.card.active');
    if (!active) return;

    if (mode === 'holding') active.classList.add('holding');
    else if (mode === 'waiting') active.classList.add('waiting');
    else if (mode === 'ready')   active.classList.add('ready');
    else if (mode === 'sent')    active.classList.add('sent');

    const hint = active.querySelector('.hint');
    if (hint) {
      if (windows.length === 0 || selected < 0) {
        hint.textContent = '';
      } else if (mode === 'idle')    hint.textContent = 'Hold to talk';
      else if (mode === 'holding')   hint.textContent = 'Listening…';
      else if (mode === 'waiting')   hint.textContent = 'Transcribing…';
      else if (mode === 'ready')     hint.textContent = 'Submit or Delete';
    }
  }

  // ---------------- Cards ----------------
  function buildCards() {
    trackEl.innerHTML = '';
    if (windows.length === 0) {
      const c = document.createElement('div');
      c.className = 'card empty active';
      c.innerHTML = `
        <div class="project">No Cursor windows</div>
        <div class="hint">Open one to begin</div>
      `;
      trackEl.appendChild(c);
      measureCards();
      return;
    }
    windows.forEach((w) => {
      const c = document.createElement('div');
      c.className = 'card';
      const host = w.host || 'mac';
      c.dataset.host = host;
      c.innerHTML = `
        <div class="host-badge" data-host="${host}">${host.toUpperCase()}</div>
        <div class="project"></div>
        <div class="pulse"></div>
        <div class="blob"></div>
        <div class="hint">Hold to talk</div>
        <div class="sent-pill">✓ Sent via "press enter"</div>
      `;
      c.querySelector('.project').textContent = w.project || w.title;
      trackEl.appendChild(c);
    });
    measureCards();
  }

  function updateActive() {
    const cards = trackEl.querySelectorAll('.card');
    cards.forEach((c, i) => {
      c.classList.toggle('active', i === selected);
    });
  }

  function measureCards() {
    const deckW = deckEl.clientWidth;
    if (deckW <= 0) return;
    // Leave ~12% for peeks on both sides (split evenly).
    cardWidth = Math.max(120, Math.round(deckW * 0.88) - 2 * CARD_MARGIN_PX);
    cardStep  = cardWidth + 2 * CARD_MARGIN_PX;
    restOffset = (deckW - cardWidth) / 2 - CARD_MARGIN_PX;

    trackEl.querySelectorAll('.card').forEach((c) => {
      c.style.width = cardWidth + 'px';
    });
    layoutTrack();
  }

  function layoutTrack(dragDelta = 0) {
    const n = Math.max(1, windows.length);
    const idx = (selected >= 0) ? selected : 0;
    const clamped = Math.max(0, Math.min(n - 1, idx));
    const x = restOffset - clamped * cardStep + dragDelta;
    trackEl.style.transform = `translate3d(${x}px, 0, 0)`;
  }

  function renderPager() {
    pagerEl.innerHTML = '';
    const n = windows.length;
    // Hide via class (not inline style) so mode-based CSS can still
    // take priority without fighting inline `display: flex`.
    pagerEl.classList.toggle('hidden', n <= 1);
    if (n <= 1) return;
    for (let i = 0; i < n; i++) {
      const d = document.createElement('div');
      d.className = 'pager-dot' + (i === selected ? ' active' : '');
      d.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (i === selected) return;
        jumpTo(i);
      });
      pagerEl.appendChild(d);
    }
  }

  function jumpTo(i) {
    if (i < 0 || i >= windows.length || i === selected) return;
    // Switching card invalidates any pending confirmation.
    if (mode === 'waiting' || mode === 'ready' || mode === 'sent') {
      setMode('idle');
    }
    selected = i;
    send({ type: 'select', index: i });
    updateActive();
    renderPager();
    applyModeClass();
    layoutTrack();
  }

  // ---------------- Gesture handling ----------------
  //
  // A single pointer lifetime goes:
  //   pointerdown → set up gesture, start hold-commit timer
  //   pointermove → if moved >SWIPE_PX horizontally, commit 'swipe'
  //                 if moved >VERTICAL_CANCEL vertically, abort
  //                 if hold-commit timer fires before either, commit 'hold'
  //   pointerup   → act on whichever state we committed to
  //
  // The short hold-commit delay lets quick horizontal flicks start a
  // swipe without momentarily flashing "Listening…" on the card.
  const HOLD_COMMIT_MS   = 140;
  const SWIPE_PX         = 12;
  const VERTICAL_CANCEL  = 36;
  const SWIPE_DISTANCE_R = 0.30;  // fraction of card step that triggers advance
  const SWIPE_VELOCITY   = 0.55;  // px / ms

  function onPointerDown(e) {
    if (gesture) return;               // ignore multi-touch
    if (e.button !== undefined && e.button !== 0) return;
    try { deckEl.setPointerCapture(e.pointerId); } catch {}

    gesture = {
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      startT: performance.now(),
      lastX: e.clientX,
      lastT: performance.now(),
      committed: null,
      holdTimer: null,
    };

    // When joystick is on, the deck becomes a virtual-joystick
    // control surface. Delegate to the joy handler and skip the
    // card-swipe/hold instrumentation entirely. onPointerMove /
    // onPointerUp also branch on joyOn so they stay consistent.
    if (joyOn) {
      joyPointerDown(e);
      return;
    }

    trackEl.classList.add('dragging');

    gesture.holdTimer = setTimeout(() => {
      if (!gesture || gesture.committed) return;
      if (windows.length === 0 || selected < 0) return;
      gesture.committed = 'hold';
      startHold();
    }, HOLD_COMMIT_MS);
  }

  function onPointerMove(e) {
    if (!gesture || e.pointerId !== gesture.pointerId) return;
    if (joyOn) {
      // Joystick feeds the cursor via drag offset; the tap-vs-drag
      // decision happens in joyPointerUp (small total offset = tap).
      joyPointerMove(e);
      gesture.lastX = e.clientX;
      gesture.lastT = performance.now();
      return;
    }
    const dx = e.clientX - gesture.startX;
    const dy = e.clientY - gesture.startY;
    gesture.lastX = e.clientX;
    gesture.lastT = performance.now();

    if (!gesture.committed) {
      if (Math.abs(dy) > VERTICAL_CANCEL && Math.abs(dy) > Math.abs(dx)) {
        // Vertical drag — user probably wasn't aiming at us.
        abortGesture();
        return;
      }
      if (Math.abs(dx) > SWIPE_PX) {
        gesture.committed = 'swipe';
        clearTimeout(gesture.holdTimer);
      }
    }

    if (gesture.committed === 'swipe') {
      let delta = dx;
      // Rubber-band at the ends so you can feel you've hit a boundary.
      const atStart = selected <= 0 && delta > 0;
      const atEnd   = selected >= windows.length - 1 && delta < 0;
      if (atStart || atEnd) delta *= 0.35;
      layoutTrack(delta);
    }
  }

  function onPointerUp(e) {
    if (!gesture || e.pointerId !== gesture.pointerId) return;
    const g = gesture;
    gesture = null;
    clearTimeout(g.holdTimer);
    trackEl.classList.remove('dragging');

    if (joyOn) {
      joyPointerUp(e);
      return;
    }

    if (g.committed === 'swipe') {
      const dx = g.lastX - g.startX;
      const dt = Math.max(1, g.lastT - g.startT);
      const velocity = dx / dt; // px per ms, negative = leftward

      let target = selected;
      const pastDistance = Math.abs(dx) > cardStep * SWIPE_DISTANCE_R;
      const pastVelocity = Math.abs(velocity) > SWIPE_VELOCITY;
      if (pastDistance || pastVelocity) {
        target = selected + (dx < 0 ? 1 : -1);
      }
      target = Math.max(0, Math.min(windows.length - 1, target));

      if (target !== selected) {
        jumpTo(target);
      } else {
        layoutTrack();
      }
    } else if (g.committed === 'hold') {
      endHold();
    } else {
      // Quick tap, no hold commit, no drag — act as a "select current
      // card" nudge. Handy if the user taps a peeking card to bring
      // it center, but taps on the active card are a no-op.
      layoutTrack();
    }
  }

  function abortGesture() {
    if (!gesture) return;
    clearTimeout(gesture.holdTimer);
    const wasHold = gesture.committed === 'hold';
    gesture = null;
    trackEl.classList.remove('dragging');
    layoutTrack();
    if (wasHold) endHold();
  }

  deckEl.addEventListener('pointerdown', onPointerDown);
  deckEl.addEventListener('pointermove', onPointerMove);
  deckEl.addEventListener('pointerup', onPointerUp);
  deckEl.addEventListener('pointercancel', onPointerUp);

  // ---------------- Hold-to-talk ----------------
  function startHold() {
    if (mode === 'holding') return;
    if (windows.length === 0) return;
    setMode('holding');
    send({ type: 'hold_start' });
    // "you're being heard now" — firmer pulse than a tap.
    haptic(HAPTIC.MEDIUM);
  }
  function endHold() {
    if (mode !== 'holding') return;
    setMode('waiting');
    send({ type: 'hold_end' });
    // "got your release" — matches the feel of MacBook Force Touch
    // click-down/click-up being two distinct haptic events.
    haptic(HAPTIC.SOFT);
  }

  // ---------------- Submit / Delete / Click buttons ----------------
  // Bottom buttons double as Delete/Submit in deck mode and as
  // L-Click/R-Click in pad mode. The dispatch happens here based on
  // the current appMode so the CSS label swap always matches what
  // the button actually does.
  btnSubmit.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (appMode === 'pad') {
      send({ type: 'mouse_click', button: 'right' });
      haptic(HAPTIC.TAP);
      return;
    }
    if (mode !== 'ready') return;
    send({ type: 'submit' });
    setMode('idle');
    haptic(HAPTIC.TAP);
  });
  btnDelete.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (appMode === 'pad') {
      send({ type: 'mouse_click', button: 'left' });
      haptic(HAPTIC.TAP);
      return;
    }
    if (mode !== 'ready') return;
    send({ type: 'delete' });
    setMode('idle');
    haptic(HAPTIC.SOFT);
  });

  // ---------------- App mode (Deck / Pad) ----------------
  function setAppMode(next) {
    if (next !== 'deck' && next !== 'pad') return;
    if (next === appMode) return;

    // If the user is in the middle of holding to talk, release the
    // modifier on their behalf so we don't leave Right Option stuck
    // down after the deck surface goes off-screen.
    if (appMode === 'deck' && mode === 'holding') {
      abortGesture();
    }
    // Any pending post-dictation state gets cleared — the UI for it
    // is tied to the deck, so it'd be invisible otherwise.
    if (mode === 'waiting' || mode === 'ready' || mode === 'sent') {
      setMode('idle');
    }
    // Abort any in-flight trackpad gesture too.
    cancelPadGesture();

    // Joystick is a deck-only feature; disengage on switch to Pad
    // so a dangling stick doesn't keep scrolling the Mac cursor
    // while the user is using the trackpad below.
    if (next === 'pad' && joyOn) {
      disengageJoystick();
    }

    appMode = next;
    document.body.setAttribute('data-app-mode', appMode);
    haptic(HAPTIC.SOFT);

    // Toggle the tab button states.
    modeTabsEl.querySelectorAll('.mode-tab').forEach((tab) => {
      tab.classList.toggle('active', tab.dataset.appMode === appMode);
    });

    // Deck re-measure (viewport width hasn't changed but the deck
    // might have just gone visible, so its clientWidth switches from
    // 0 to real).
    if (appMode === 'deck') {
      requestAnimationFrame(() => {
        measureCards();
        layoutTrack();
      });
    }
  }

  modeTabsEl.querySelectorAll('.mode-tab').forEach((tab) => {
    tab.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      setAppMode(tab.dataset.appMode);
    });
  });

  // ---------------- Trackpad (pad mode) ----------------
  //
  // Mac-trackpad-parity goals:
  //   • Single-finger drag → cursor move, no jitter, Mac-style
  //     non-linear acceleration (slow = precise, fast = traverses).
  //   • One-finger tap → left click. Two-finger tap → right click.
  //   • Two-finger drag → scroll (averaged across both pointers).
  //   • Edge-cross to the PC when two machines are paired.
  //
  // Why the previous version glitched: it sent one WebSocket
  // message per pointermove event. iOS Safari fires those up to
  // 120 Hz on a 120 Hz screen, each with a single-sample delta, so
  // under any network load you'd get visible stutter and the cursor
  // would "walk" instead of "glide". It also hard-cut sub-pixel
  // movement with `Math.abs(sx) >= 0.5`, so very slow drags dropped
  // silently — the "sticky finger" feeling.
  //
  // The rewrite:
  //   1. Use getCoalescedEvents() so we see every intermediate
  //      sample the OS captured between dispatched pointermoves.
  //      iOS Safari coalesces; using this is free precision.
  //   2. Accumulate deltas per pointer per frame in padFrameDeltas.
  //   3. One requestAnimationFrame callback emits ONE mouse_move or
  //      ONE mouse_scroll per frame. That's 60–120 messages/second
  //      max regardless of how fast the user swipes — which is
  //      roughly what macOS itself feeds its cursor.
  //   4. Sub-pixel remainder (padRemainderX/Y) lets tiny 0.3-px
  //      deltas accumulate until they flip a whole pixel, so slow
  //      drags work smoothly instead of being rounded to zero.
  //   5. Acceleration curve — gentle ease on slow moves, super-
  //      linear for fast swipes. Matches the feel of the macOS
  //      default "tracking speed = medium" curve closely enough
  //      that muscle memory survives the handoff.

  const PAD_BASE_SENSITIVITY   = 1.55; // slow-move linear scale
  const PAD_ACCEL_THRESHOLD    = 0.8;  // px/ms below which we DO NOT accelerate
  const PAD_ACCEL_EXPONENT     = 0.85; // curve shape; 1.0 = linear
  const PAD_ACCEL_COEFF        = 9.0;  // how quickly accel ramps
  const PAD_ACCEL_CAP          = 3.4;  // hard ceiling on the multiplier

  // Tap timing: gesture-wide (first-down → last-up), so the budget
  // needs to be a bit more forgiving than a single-finger press —
  // two-finger taps have natural motor timing around 220–300 ms.
  const PAD_TAP_MAX_MS         = 320;
  const PAD_TAP_MAX_PX         = 8;    // per-pointer jitter tolerance

  const SCROLL_SENSITIVITY     = 1.6;

  // Active pointers:  pointerId → { startX, startY, startT,
  //                                 lastX, lastY, lastT, moved }
  const padPointers = new Map();

  // Per-pointer, per-frame pending delta. Cleared by the flush.
  const padFrameDeltas = new Map();   // pointerId → { dx, dy }
  let padRemainderX       = 0;        // sub-pixel carry on move
  let padRemainderY       = 0;
  let padScrollRemainderX = 0;        // sub-pixel carry on scroll
  let padScrollRemainderY = 0;
  let padFrameScheduled   = false;

  // Gesture-wide state (spans multiple pointer lifetimes). Resets
  // when padPointers.size transitions from non-zero back to zero.
  // We need this to distinguish 1-finger-tap (left click) from
  // 2-finger-tap (right click) even though pointerup fires for
  // each finger separately.
  let padGestureMaxFingers = 0;
  let padGestureAnyMoved   = false;
  let padGestureStartT     = 0;

  // Cursor-host pill (MAC / PC). Brief accent flash on crossing,
  // plus a soft haptic pulse so the handoff feels physical.
  function setCursorHost(host) {
    if (host !== 'mac' && host !== 'pc') return;
    if (padHostEl.dataset.host === host) return;
    padHostEl.dataset.host = host;
    padHostEl.textContent = host.toUpperCase();
    trackpadEl.classList.add('active');
    haptic(HAPTIC.SOFT);
    setTimeout(() => {
      if (padPointers.size === 0) trackpadEl.classList.remove('active');
    }, 260);
  }

  function padUpdateTouchIndicator(x, y) {
    const rect = trackpadEl.getBoundingClientRect();
    padTouchEl.style.setProperty('--touch-x', (x - rect.left) + 'px');
    padTouchEl.style.setProperty('--touch-y', (y - rect.top)  + 'px');
  }

  function cancelPadGesture() {
    padPointers.clear();
    padFrameDeltas.clear();
    padGestureMaxFingers = 0;
    padGestureAnyMoved   = false;
    padRemainderX = padRemainderY = 0;
    padScrollRemainderX = padScrollRemainderY = 0;
    padTouchEl.classList.remove('show');
    trackpadEl.classList.remove('active');
  }

  function schedulePadFrame() {
    if (padFrameScheduled) return;
    padFrameScheduled = true;
    requestAnimationFrame(flushPadFrame);
  }

  function flushPadFrame() {
    padFrameScheduled = false;
    if (padFrameDeltas.size === 0) return;

    // How many fingers moved this frame determines whether this
    // is a move or a scroll. We trust padPointers (live) over
    // padFrameDeltas (may include a pointer that just lifted).
    const activeCount = padPointers.size;
    const movingIds   = [...padFrameDeltas.keys()];

    if (activeCount <= 1 && movingIds.length >= 1) {
      // Single-finger drag → cursor move. If multiple pointerids
      // somehow queued (e.g. a quick second finger tap during a
      // drag), sum their deltas — it'll still look like the user's
      // intent.
      let dx = 0, dy = 0;
      for (const id of movingIds) {
        const d = padFrameDeltas.get(id);
        dx += d.dx; dy += d.dy;
      }
      emitPadMove(dx, dy);
    } else if (activeCount >= 2) {
      // Two-finger scroll — average deltas across whichever pointers
      // moved this frame. Summing would make scrolling 2× too fast
      // since the fingers should be moving roughly together.
      let dx = 0, dy = 0;
      for (const id of movingIds) {
        const d = padFrameDeltas.get(id);
        dx += d.dx; dy += d.dy;
      }
      dx /= movingIds.length;
      dy /= movingIds.length;
      emitPadScroll(dx, dy);
    }

    padFrameDeltas.clear();
  }

  // Trackpad-style acceleration: magnitude-aware multiplier.
  // Below PAD_ACCEL_THRESHOLD (≈ a slow pen-on-paper drag) we use
  // a flat 1.0× so precision doesn't fight the user. Above it we
  // ramp into a power curve, capped so flick-swipes don't teleport
  // off the screen.
  function padAccelFactor(magPxPerFrame) {
    // magPxPerFrame is effectively the speed at ~60 Hz. Convert to
    // px/ms so the threshold isn't tied to frame rate.
    const speed = magPxPerFrame / (1000 / 60);
    if (speed <= PAD_ACCEL_THRESHOLD) return 1.0;
    const over  = speed - PAD_ACCEL_THRESHOLD;
    const boost = Math.pow(over * PAD_ACCEL_COEFF, PAD_ACCEL_EXPONENT);
    return Math.min(PAD_ACCEL_CAP, 1.0 + boost * 0.12);
  }

  function emitPadMove(rawDx, rawDy) {
    const mag   = Math.hypot(rawDx, rawDy);
    const accel = padAccelFactor(mag);
    const sx = rawDx * PAD_BASE_SENSITIVITY * accel + padRemainderX;
    const sy = rawDy * PAD_BASE_SENSITIVITY * accel + padRemainderY;
    // Math.trunc (vs round) keeps the sign consistent for the
    // remainder — important so slow drags don't jitter around 0.
    const ix = Math.trunc(sx);
    const iy = Math.trunc(sy);
    padRemainderX = sx - ix;
    padRemainderY = sy - iy;
    if (ix !== 0 || iy !== 0) send({ type: 'mouse_move', dx: ix, dy: iy });
  }

  function emitPadScroll(rawDx, rawDy) {
    const sx = rawDx * SCROLL_SENSITIVITY + padScrollRemainderX;
    const sy = rawDy * SCROLL_SENSITIVITY + padScrollRemainderY;
    const ix = Math.trunc(sx);
    const iy = Math.trunc(sy);
    padScrollRemainderX = sx - ix;
    padScrollRemainderY = sy - iy;
    // macOS natural scroll convention: fingers down → content down.
    if (ix !== 0 || iy !== 0) send({ type: 'mouse_scroll', dx: ix, dy: iy });
  }

  trackpadEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    try { trackpadEl.setPointerCapture(e.pointerId); } catch {}

    const now = performance.now();
    if (padPointers.size === 0) {
      // Fresh gesture — reset all gesture-wide accumulators. Keeping
      // the per-gesture remainders fresh avoids "phantom drift" on
      // the first few pixels of a new drag.
      padGestureMaxFingers = 1;
      padGestureAnyMoved   = false;
      padGestureStartT     = now;
      padRemainderX = padRemainderY = 0;
      padScrollRemainderX = padScrollRemainderY = 0;
    } else {
      padGestureMaxFingers = Math.max(padGestureMaxFingers, padPointers.size + 1);
    }

    padPointers.set(e.pointerId, {
      startX: e.clientX, startY: e.clientY, startT: now,
      lastX:  e.clientX, lastY:  e.clientY, lastT:  now,
      moved:  false,
    });

    if (padPointers.size === 1) {
      padUpdateTouchIndicator(e.clientX, e.clientY);
      padTouchEl.classList.add('show');
      trackpadEl.classList.add('active');
    } else {
      padTouchEl.classList.remove('show');
    }
  });

  trackpadEl.addEventListener('pointermove', (e) => {
    const p = padPointers.get(e.pointerId);
    if (!p) return;

    // iOS Safari coalesces pointer events on high-refresh screens;
    // asking for the coalesced list gives us the intermediate
    // samples the OS saw. Falling back to [e] for browsers that
    // don't implement it (most desktops) is equivalent to the old
    // behavior.
    const coalesced =
      (typeof e.getCoalescedEvents === 'function')
        ? e.getCoalescedEvents()
        : [];
    const samples = coalesced.length ? coalesced : [e];

    let dxTotal = 0, dyTotal = 0;
    for (const s of samples) {
      dxTotal += s.clientX - p.lastX;
      dyTotal += s.clientY - p.lastY;
      p.lastX  = s.clientX;
      p.lastY  = s.clientY;
    }
    p.lastT = performance.now();

    // Per-pointer and gesture-wide "did they actually drag?" checks.
    const totalDx = e.clientX - p.startX;
    const totalDy = e.clientY - p.startY;
    if (Math.abs(totalDx) > PAD_TAP_MAX_PX ||
        Math.abs(totalDy) > PAD_TAP_MAX_PX) {
      p.moved = true;
      padGestureAnyMoved = true;
    }

    let acc = padFrameDeltas.get(e.pointerId);
    if (!acc) { acc = { dx: 0, dy: 0 }; padFrameDeltas.set(e.pointerId, acc); }
    acc.dx += dxTotal;
    acc.dy += dyTotal;
    schedulePadFrame();

    if (padPointers.size === 1) {
      padUpdateTouchIndicator(e.clientX, e.clientY);
    }
  });

  function padOnPointerUp(e) {
    const p = padPointers.get(e.pointerId);
    if (!p) return;
    padPointers.delete(e.pointerId);

    // Flush any pending frame synchronously so the last few pixels
    // of a flick-drag don't get swallowed when the finger leaves.
    if (padFrameScheduled || padFrameDeltas.size) {
      flushPadFrame();
    }

    // When the LAST pointer lifts, the gesture is complete —
    // that's the moment we can classify it as a tap vs a drag and
    // fire the click if appropriate.
    if (padPointers.size === 0) {
      const gestureDur = performance.now() - padGestureStartT;
      const wasTap     = !padGestureAnyMoved &&
                         gestureDur < PAD_TAP_MAX_MS;

      if (wasTap) {
        if (padGestureMaxFingers >= 2) {
          send({ type: 'mouse_click', button: 'right' });
        } else {
          send({ type: 'mouse_click', button: 'left' });
        }
        haptic(HAPTIC.TAP);
      }

      // Reset gesture state for the next gesture.
      padGestureMaxFingers = 0;
      padGestureAnyMoved   = false;
      padFrameDeltas.clear();
      padTouchEl.classList.remove('show');
      trackpadEl.classList.remove('active');
    }
  }

  trackpadEl.addEventListener('pointerup', padOnPointerUp);
  trackpadEl.addEventListener('pointercancel', padOnPointerUp);

  // ---------------- Presets ----------------
  function renderPresets() {
    presetsEl.innerHTML = '';
    if (!presets.length) {
      presetsEl.classList.add('hidden');
      return;
    }
    presetsEl.classList.remove('hidden');
    presets.forEach((p) => {
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'preset';
      el.dataset.presetId = p.id;
      el.textContent = p.label;
      el.title = `${p.label} (${p.submit})`;
      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        firePreset(p);
        haptic(HAPTIC.TAP);
      });
      presetsEl.appendChild(el);
    });
  }

  function firePreset(p) {
    if (mode === 'holding') return;
    if (mode === 'waiting' || mode === 'ready' || mode === 'sent') {
      setMode('idle');
    }
    if (!windows.length) return;

    const el = presetsEl.querySelector(`.preset[data-preset-id="${cssEscape(p.id)}"]`);
    if (el) {
      el.classList.remove('flash-ok', 'flash-err');
      el.classList.add('firing');
    }
    send({ type: 'preset', id: p.id });
  }

  function flashPreset(id, ok) {
    const el = presetsEl.querySelector(`.preset[data-preset-id="${cssEscape(id)}"]`);
    if (!el) return;
    el.classList.remove('firing');
    el.classList.add(ok ? 'flash-ok' : 'flash-err');
    // Confirm server actually fired it. ERR pattern tells the user
    // to look at their Mac — the preset either had no text field to
    // paste into, or Cursor wasn't focusable.
    haptic(ok ? HAPTIC.DONE : HAPTIC.ERR);
    setTimeout(() => {
      el.classList.remove('flash-ok', 'flash-err');
    }, 900);
  }

  function cssEscape(s) {
    if (window.CSS && CSS.escape) return CSS.escape(s);
    return String(s).replace(/[^a-zA-Z0-9_-]/g, (c) => `\\${c}`);
  }

  // ---------------- Joystick mode ----------------
  //
  // When the Stick chip is toggled on, the deck becomes a virtual
  // joystick surface. Touch anywhere to drop the stick origin at
  // that point; drag to drive the Mac cursor (rate-controlled: how
  // far you drag = how fast the cursor moves, direction = drag
  // direction). Release to stop. A tap with no drag = left click.
  //
  // Why on-deck origin (instead of a fixed joystick position)?
  // Keeps the thumb anywhere you naturally rest it. Feels like a
  // mobile-FPS left-stick — drop, drag, release.

  let joyOn = false;
  let joyActive = null;        // active pointer state while dragging
  let joyRAF = 0;
  let joyLastTickTs = 0;

  // Dead zone (no motion) and max-throw radius, in CSS pixels.
  // Beyond JOY_MAX_PX the nub stops moving but the velocity stays
  // pinned at the max speed, so flicking to the edge = full speed.
  const JOY_DEAD_PX  = 18;
  const JOY_MAX_PX   = 90;
  // Top cursor speed in Mac pixels per second. 1400 feels peppy on
  // a 1470px primary display — crossable in a bit under a second
  // edge-to-edge. Tune to taste.
  const JOY_MAX_SPEED = 1400;
  // Below this total drag offset at pointerup, treat it as a click.
  const JOY_TAP_PX = 6;
  // Milliseconds of contact that also still qualifies as a tap.
  const JOY_TAP_MS = 260;

  function updateJoyChip() {
    joyChipEl.classList.toggle('on', joyOn);
    joyChipEl.setAttribute('aria-pressed', joyOn ? 'true' : 'false');
    document.body.classList.toggle('joy-on', joyOn);
  }

  function engageJoystick() {
    joyOn = true;
    updateJoyChip();
    haptic(HAPTIC.MEDIUM);
  }

  function disengageJoystick() {
    joyOn = false;
    joyActive = null;
    cancelAnimationFrame(joyRAF);
    joyRAF = 0;
    hideJoyVisuals();
    updateJoyChip();
    haptic(HAPTIC.SOFT);
  }

  joyChipEl.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    if (joyOn) disengageJoystick();
    else engageJoystick();
  });

  // ----- Visual helpers (ring + nub) -----

  function showJoyVisuals(originX, originY, nubX, nubY) {
    joyRingEl.style.left = originX + 'px';
    joyRingEl.style.top  = originY + 'px';
    joyNubEl.style.left  = nubX + 'px';
    joyNubEl.style.top   = nubY + 'px';
    joyRingEl.classList.add('show');
    joyNubEl.classList.add('show');
  }
  function updateJoyNub(nubX, nubY) {
    joyNubEl.style.left = nubX + 'px';
    joyNubEl.style.top  = nubY + 'px';
  }
  function hideJoyVisuals() {
    joyRingEl.classList.remove('show');
    joyNubEl.classList.remove('show');
  }

  // ----- Pointer handlers (called from the shared onPointerDown/…) -----

  function joyPointerDown(e) {
    // Coordinates relative to the deck element — the ring/nub are
    // absolute-positioned inside #deck, so we use offsetX/Y-style
    // local coords (computed from clientX minus the deck rect).
    const rect = deckEl.getBoundingClientRect();
    const lx = e.clientX - rect.left;
    const ly = e.clientY - rect.top;

    joyActive = {
      pointerId: e.pointerId,
      originX: lx,
      originY: ly,
      lastX: lx,
      lastY: ly,
      startT: performance.now(),
      movedMax: 0,
    };
    showJoyVisuals(lx, ly, lx, ly);

    // Kick the RAF loop. It stays armed until pointerup (so the
    // cursor keeps moving even if the user holds the stick still
    // at full throw without generating pointermoves).
    joyLastTickTs = performance.now();
    cancelAnimationFrame(joyRAF);
    joyRAF = requestAnimationFrame(joyTick);
  }

  function joyPointerMove(e) {
    if (!joyActive || e.pointerId !== joyActive.pointerId) return;
    const rect = deckEl.getBoundingClientRect();
    joyActive.lastX = e.clientX - rect.left;
    joyActive.lastY = e.clientY - rect.top;

    // Track the peak drag distance so pointerup can tell "tap"
    // from "tiny drag".
    const dx = joyActive.lastX - joyActive.originX;
    const dy = joyActive.lastY - joyActive.originY;
    const d = Math.hypot(dx, dy);
    if (d > joyActive.movedMax) joyActive.movedMax = d;

    // Clamp the nub to the max-throw circle so it visually pins
    // to the edge when you drag past JOY_MAX_PX.
    const clamped = Math.min(d, JOY_MAX_PX);
    const nx = joyActive.originX + (d > 0 ? (dx / d) * clamped : 0);
    const ny = joyActive.originY + (d > 0 ? (dy / d) * clamped : 0);
    updateJoyNub(nx, ny);
  }

  function joyPointerUp(e) {
    if (!joyActive || e.pointerId !== joyActive.pointerId) return;
    const heldMs = performance.now() - joyActive.startT;
    const wasTap = joyActive.movedMax < JOY_TAP_PX && heldMs < JOY_TAP_MS;
    joyActive = null;
    cancelAnimationFrame(joyRAF);
    joyRAF = 0;
    hideJoyVisuals();
    if (wasTap) {
      send({ type: 'mouse_click', button: 'left' });
      haptic(HAPTIC.TAP);
    }
  }

  // ----- RAF loop: translate stick offset → per-frame mouse_move -----

  function joyTick(ts) {
    if (!joyActive) return;
    joyRAF = requestAnimationFrame(joyTick);

    const dtMs = Math.max(1, ts - joyLastTickTs);
    joyLastTickTs = ts;

    const dx = joyActive.lastX - joyActive.originX;
    const dy = joyActive.lastY - joyActive.originY;
    const dist = Math.hypot(dx, dy);
    if (dist < JOY_DEAD_PX) return;

    // Magnitude: 0 at dead-zone edge, 1 at max throw, clamped.
    const mag = Math.min(1, (dist - JOY_DEAD_PX) / (JOY_MAX_PX - JOY_DEAD_PX));
    // Ease-in curve (squared) so small offsets feel gentle and full
    // throw still gives you top speed. Gives the stick a mechanical
    // feel instead of a linear "always too fast or too slow" one.
    const eased = mag * mag;

    const speed = JOY_MAX_SPEED * eased;       // px / s
    const ux = dx / dist, uy = dy / dist;       // unit direction
    const vx = ux * speed;
    const vy = uy * speed;

    // Per-frame pixel delta. Sub-pixel deltas get dropped by the
    // Mac event pipeline, but we still send them so accumulated
    // micro-motion eventually registers.
    const fdx = vx * dtMs / 1000;
    const fdy = vy * dtMs / 1000;
    send({ type: 'mouse_move', dx: fdx, dy: fdy });
  }

  // ---------------- Global gesture hardening ----------------
  // iOS Safari still fires these even with touch-action set, so squash
  // them defensively.
  document.addEventListener('gesturestart',  (e) => e.preventDefault());
  document.addEventListener('gesturechange', (e) => e.preventDefault());
  document.addEventListener('dblclick',      (e) => e.preventDefault());
  document.addEventListener('contextmenu',   (e) => e.preventDefault());

  window.addEventListener('resize', measureCards);
  window.addEventListener('orientationchange', () => {
    // Wait one frame for the layout to settle before re-measuring.
    requestAnimationFrame(() => requestAnimationFrame(measureCards));
  });

  // Initial paint — start in deck mode with an empty card until the
  // first state arrives over the WebSocket.
  document.body.setAttribute('data-app-mode', appMode);
  setMode('idle');
  buildCards();
  renderPager();
  renderPresets();
  updateJoyChip();
  connect();
})();
</script>
</body>
</html>
